<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Player</title>

<!-- HLS.js (m3u8 চালানোর জন্য) -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- Shaka Player (MPD DASH চালানোর জন্য) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>

/* পুরো পেজ */
html, body {
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

/* ভিডিও wrapper */
#video-wrapper{
width:100vw;
height:100vh;
}

/* ভিডিও */
video{
width:100%;
height:100%;
object-fit:contain;
}

/* কন্ট্রোল clean রাখা */
video::-webkit-media-controls-panel,
video::-webkit-media-controls{
background:transparent !important;
}

/* তিন ডট menu hide */
video::-webkit-media-controls-overflow-button{
display:none !important;
}

/* fullscreen button hide */
video::-webkit-media-controls-fullscreen-button{
display:none !important;
}

/* time display hide */
video::-webkit-media-controls-current-time-display,
video::-webkit-media-controls-time-remaining-display{
display:none !important;
}

/* seek bar hide */
video::-webkit-media-controls-timeline{
display:none !important;
}

</style>
</head>

<body>

<div id="video-wrapper">

<!-- ভিডিও প্লেয়ার -->
<video id="video" controls autoplay playsinline></video>

<!-- YouTube player container -->
<div id="youtube"></div>

</div>


<script>

/*
===============================
URL PARAMETER SYSTEM
===============================

m3u8 example

player.html?url=https://site.com/video.m3u8

mp4 example

player.html?url=https://site.com/video.mp4

php video example

player.html?url=https://site.com/video.php?id=123

mpd without key

player.html?mpd=https://site.com/video.mpd

mpd with key

player.html?mpd=https://site.com/video.mpd&keyid=XXXX&key=YYYY

youtube example

player.html?yt=VIDEOID

example

player.html?yt=dQw4w9WgXcQ

===============================
*/

const params = new URLSearchParams(window.location.search);

const url = params.get("url"); // m3u8 / mp4 / php
const mpd = params.get("mpd"); // dash
const keyid = params.get("keyid"); // dash key id
const key = params.get("key"); // dash key
const yt = params.get("yt"); // youtube id

const video = document.getElementById("video");
const ytDiv = document.getElementById("youtube");


/* ================================
YOUTUBE PLAYER
================================ */

if(yt){

video.style.display="none";

ytDiv.innerHTML=`
<iframe width="100%" height="100%"
src="https://www.youtube.com/embed/${yt}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>
`;

}


/* ================================
HLS m3u8 PLAYER
================================ */

else if(url && url.includes(".m3u8")){

if(Hls.isSupported()){

const hls=new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}

else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src=url;

}

}


/* ================================
DASH MPD PLAYER
================================ */

else if(mpd){

const player=new shaka.Player(video);

/* যদি key থাকে */
if(keyid && key){

player.configure({
drm:{
clearKeys:{
[keyid]:key
}
}
});

}

/* mpd load */

player.load(mpd);

}


/* ================================
NORMAL VIDEO (mp4 / php / other)
================================ */

else if(url){

video.src=url;

}

</script>


<script>

/*
========================================
KEYBOARD SHORTCUT SYSTEM
========================================

ArrowUp = Volume Up
ArrowDown = Volume Down
M = Mute / Unmute
Space / Enter = Play Pause

========================================
*/

document.addEventListener("DOMContentLoaded", () => {

const video=document.getElementById("video");

/* keyboard listener */

document.addEventListener("keydown",function(e){

const tag=document.activeElement.tagName.toLowerCase();

if(tag==="input"||tag==="textarea")return;


/* volume up */

if(e.key==="ArrowUp"){

e.preventDefault();

video.volume=Math.min(video.volume+0.1,1);

}


/* volume down */

if(e.key==="ArrowDown"){

e.preventDefault();

video.volume=Math.max(video.volume-0.1,0);

}


/* mute toggle */

if(e.key==="m"||e.key==="M"){

e.preventDefault();

video.muted=!video.muted;

}


/* play pause */

if(e.code==="Space"||e.keyCode===32||e.key==="Enter"){

e.preventDefault();

if(video.paused)video.play();

else video.pause();

}

});

});

</script>

</body>
</html>
